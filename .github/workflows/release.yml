name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: release packages'
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Verify package tags and GitHub releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Published packages: ${PUBLISHED_PACKAGES}"

          # Configure git identity for fallback annotated tags
          git config user.name "walterra-dev-release[bot]"
          git config user.email "249269583+walterra-dev-release[bot]@users.noreply.github.com"

          echo "${PUBLISHED_PACKAGES}" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            TAG="${NAME}@${VERSION}"

            echo "Ensuring tag and release exist for ${TAG}"

            # Ensure local tag exists (fallback creation if missing)
            if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              git tag -a "${TAG}" "${GITHUB_SHA}" -m "${TAG}"
            fi

            # Ensure remote tag exists
            if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              git push origin "refs/tags/${TAG}"
            fi

            # Ensure GitHub release exists
            if ! gh release view "${TAG}" >/dev/null 2>&1; then
              gh release create "${TAG}" \
                --verify-tag \
                --target "${GITHUB_SHA}" \
                --title "${TAG}" \
                --notes "Automated release for ${TAG}"
            fi
          done
